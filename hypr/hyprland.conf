# hyprland.conf

source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/hyprland-gui.conf


# ─────────────────────────────────────────────────────────────────────────────
# PROGRAMS
# ─────────────────────────────────────────────────────────────────────────────

$terminal    = kitty
$fileManager = nemo
$mainMod     = SUPER
$ipc         = noctalia msg


# ─────────────────────────────────────────────────────────────────────────────
# MONITOR
# ─────────────────────────────────────────────────────────────────────────────

monitor = ,preferred,auto,auto


# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────

env = QT_QPA_PLATFORM,wayland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,capitaine-cursors
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,adw-gtk3-dark
env = GSETTINGS_SCHEMA_DIR,/run/current-system/sw/share/glib-2.0/schemas
env = GTK_APPLICATION_PREFER_DARK_THEME,1


# ─────────────────────────────────────────────────────────────────────────────
# AUTOSTART
# ─────────────────────────────────────────────────────────────────────────────

exec-once = noctalia
exec-once = pkill kded6
exec-once = sleep 3 && trayscale --window-type=utility --hide-window
exec-once = udiskie --no-tray
exec-once = /run/current-system/sw/bin/kdeconnect-indicator

# ─────────────────────────────────────────────────────────────────────────────
# LOOK AND FEEL
# ─────────────────────────────────────────────────────────────────────────────

general {
    gaps_in  = 4
    gaps_out = 2

    border_size = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 5
    rounding_power = 5

    active_opacity   = 0.95
    inactive_opacity = 0.6

    shadow {
        enabled      = false
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 1
        new_optimizations = true
        xray              = false
        vibrancy          = 1
        vibrancy_darkness = 0.60
    }
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


# ─────────────────────────────────────────────────────────────────────────────
# ANIMATIONS
# ─────────────────────────────────────────────────────────────────────────────

animations {
    enabled = yes

    # curves
    bezier = quick,  0.15, 0,    0.1,  1
    bezier = snap,   0.23, 1,    0.32, 1
    bezier = bounce, 0.35, 1.15, 0.65, 1

    # global
    animation = global,        1, 15,  default

    # borders
    animation = border,        1, 10,  quick

    # windows
    animation = windows,       1, 6,   bounce
    animation = windowsIn,     1, 5,   bounce
    animation = windowsOut,    1, 6.5, bounce

    # fade
    animation = fadeIn,        1, 0.5, quick
    animation = fadeOut,       1, 0.4, quick
    animation = fade,          1, 1.0, quick

    # layers
    animation = layers,        1, 4,   snap
    animation = layersIn,      1, 3.5, snap,   slide
    animation = layersOut,     1, 3.5, snap,   slide
    animation = fadeLayersIn,  1, 0.3, quick
    animation = fadeLayersOut, 1, 0.2, quick

    # workspaces
    animation = workspaces,    1, 5.5, bounce, slide
    animation = workspacesIn,  1, 5.5, bounce, slide
    animation = workspacesOut, 1, 4,   quick,  slide

    animation = zoomFactor,    1, 10,  quick
}


# ─────────────────────────────────────────────────────────────────────────────
# INPUT
# ─────────────────────────────────────────────────────────────────────────────

input {
    kb_layout    = ie
    follow_mouse = 1
    sensitivity  = 0    # -1.0 to 1.0, 0 = no modification

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


# ─────────────────────────────────────────────────────────────────────────────
# WINDOW RULES
# ─────────────────────────────────────────────────────────────────────────────

# scrcpy: float and size like a phone
windowrule = match:class .scrcpy-wrapped, float on
windowrule = match:class .scrcpy-wrapped, size 313 675
windowrule = match:class .scrcpy-wrapped, rounding 5

# kitty microfetch popup
windowrule = match:class kitty-microfetch, float on
windowrule = match:class kitty-microfetch, size 900 275

# suppress maximize requests from all apps
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# fix xwayland drag issues
windowrule {
    name         = fix-xwayland-drags
    match:class  = ^$
    match:title  = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

# hyprland-run popup: near bottom of screen
windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}


# ─────────────────────────────────────────────────────────────────────────────
# KEYBINDINGS
# ─────────────────────────────────────────────────────────────────────────────

# apps
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, helium
bind = $mainMod,       K,      exec, kdeconnect
bind = $mainMod SHIFT, B,      exec, flatpak run waterfox
bind = $mainMod,       F12,    exec, kitty --class kitty-microfetch -e sh -c "microfetch; read -r"
bind = $mainMod, C, exec, claude-desktop

# noctalia shell ipc
bind  = $mainMod, Space,  exec, $ipc panel-toggle launcher
bind  = $mainMod, slash,  exec, $ipc settings-toggle
bind  = $mainMod, Escape, exec, $ipc panel-toggle session
#bind  = $mainMod, Tab,    exec, $ipc plugin:workspace-overview toggle
bind  = $mainMod, Print,  exec, $ipc screenshot region
bindr = SUPER,    Super_L, exec, $ipc panel-toggle control-center   # fires on release
bind = Control Shift, Escape, exec, $ipc panel-toggle control-center system
bind = SUPER, N, exec, $ipc panel-toggle control-center notifications
bind = SUPER Shift, V, exec, $ipc panel-toggle clipboard


# window management
bind = $mainMod,       Q, killactive
bind = $mainMod,       T, exec, /home/ven/.config/hypr/scripts/toggle-float.sh
bind = $mainMod,       P, pseudo        # dwindle pseudotile
bind = $mainMod,       V, layoutmsg, togglesplit
bind = $mainMod,       F, fullscreen, 1 # maximize (keep gaps/borders)
bind = $mainMod SHIFT, F, fullscreen, 0 # true fullscreen

# focus (arrow keys)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# move window to workspace silently (no focus follow)
bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6
bind = SUPER ALT, 7, movetoworkspacesilent, 7
bind = SUPER ALT, 8, movetoworkspacesilent, 8
bind = SUPER ALT, 9, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, 10

# special/scratchpad workspace
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# media + brightness (repeating while held)
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# playerctl (locked = works on lockscreen)
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


# ─────────────────────────────────────────────────────────────────────────────
# NOCTALIA / HVE (auto-managed, leave at bottom)
# ─────────────────────────────────────────────────────────────────────────────

# >>> HYPRLAND VISUAL EDITOR START <<<
exec-once = /home/ven/.cache/noctalia/HVE/hve_watchdog.sh
source = /home/ven/.config/hypr/noctalia/noctalia-colors.conf
source = /home/ven/.cache/noctalia/HVE/overlay.conf
# >>> HYPRLAND VISUAL EDITOR END <<<

source = ./hyprviz/hyprviz.conf

# For Noctalia Color templates
source = /home/ven/.config/hypr/noctalia.conf
